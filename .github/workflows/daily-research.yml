name: Daily NotebookLM Research

on:
  # Schedule DISATTIVATO: la sessione ora vive sul VPS (unica "casa").
  # Tenere attivi sia GitHub sia VPS desincronizza i cookie di Google.
  # Lasciato solo l'avvio manuale come riserva d'emergenza.
  workflow_dispatch: {}

# Condivide il "lock" col keepalive: non toccano il secret nello stesso momento
concurrency:
  group: notebooklm-auth
  cancel-in-progress: false

env:
  NOTEBOOKLM_HOME: ${{ github.workspace }}/nlm_home

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa notebooklm-py
        run: pip install -r requirements.txt

      - name: Prepara la sessione (profilo scrivibile dal secret)
        env:
          AUTH_SRC: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          SS="$NOTEBOOKLM_HOME/profiles/default/storage_state.json"
          mkdir -p "$(dirname "$SS")"
          printf '%s' "$AUTH_SRC" > "$SS"

      - name: Deep research + report + email
        env:
          RESEARCH_MODE: fast
          RESEARCH_TIMEOUT: "600"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python daily_research.py

      - name: Ripush dei cookie ruotati nel secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SS="$NOTEBOOKLM_HOME/profiles/default/storage_state.json"
          if [ -n "$GH_TOKEN" ] && [ -s "$SS" ]; then
            gh secret set NOTEBOOKLM_AUTH_JSON < "$SS"
            echo "Secret aggiornato."
          else
            echo "::warning::GH_PAT non impostato: salto l'aggiornamento del secret."
          fi

      - name: Salva il report come artifact del run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: report-*.md
          if-no-files-found: ignore
