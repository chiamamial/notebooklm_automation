name: Keep NotebookLM session warm

# I cookie di Google vanno "rinfrescati" o la sessione scade. Su GitHub Actions
# il secret e' in sola lettura, quindi:
#   1) scriviamo il secret in un profilo locale scrivibile (nlm_home)
#   2) `auth refresh` ruota e SALVA i cookie in quel profilo
#   3) ripushiamo il file aggiornato dentro il secret NOTEBOOKLM_AUTH_JSON
# Cosi' la sessione si auto-mantiene viva senza intervento manuale.
#
# Richiede un secret GH_PAT = Personal Access Token (fine-grained) con permesso
# "Secrets: write" su questo repo (vedi README).

on:
  # Schedule DISATTIVATO: il keepalive ora gira sul VPS (systemd timer).
  # Lasciato solo l'avvio manuale.
  workflow_dispatch: {}

# Evita che keepalive e ricerca giornaliera tocchino il secret insieme
concurrency:
  group: notebooklm-auth
  cancel-in-progress: false

env:
  NOTEBOOKLM_HOME: ${{ github.workspace }}/nlm_home

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh sessione e ripush del secret
        env:
          AUTH_SRC: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SS="$NOTEBOOKLM_HOME/profiles/default/storage_state.json"
          mkdir -p "$(dirname "$SS")"
          printf '%s' "$AUTH_SRC" > "$SS"
          notebooklm auth refresh
          gh secret set NOTEBOOKLM_AUTH_JSON < "$SS"
          echo "Secret aggiornato con i cookie ruotati."
